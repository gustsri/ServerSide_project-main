{% extends "layout.html" %}

{% block title %}Create Category{% endblock %}

{% block content %}
<div class="container">
  <h1 class="mt-4">Create Category</h1>
  <div class="row justify-content-center">
    <div class="col-md-6">
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          {{ form.category_name.label_tag }}
          {{ form.category_name }}
        </div>
        <button type="submit" class="btn btn-primary">Save</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
